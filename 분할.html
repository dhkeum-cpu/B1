<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무재해 사고일수 알림판 - OP1/OP2</title>
    <style>
        /* ... 기존 스타일 유지 ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', 'Helvetica Neue', sans-serif; background-color: #000; }
        .main-container { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .background-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            background-size: cover;
            background-position: center;
            /* 배경 전환을 부드럽게 만들기 위한 트랜지션 추가 */
            transition: background-image 1.5s ease-in-out;
        }

        /* 이하 기존 CSS 동일 */
        .operation-section { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; z-index: 2; overflow: hidden; }
        .operation-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.55); z-index: 1; }
        .billboard-content { position: relative; z-index: 3; width: 90%; max-width: 900px; text-align: center; animation: fadeIn 0.8s ease-in; }
        .logo-area { position: absolute; top: 20px; left: 20px; z-index: 5; }
        .logo-area img { max-width: 100px; height: auto; filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5)); }
        .operation-name { font-size: clamp(36px, 8vw, 64px); font-weight: 900; color: #ffffff; text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.8); line-height: 1; margin-bottom: 10px; letter-spacing: 2px; }
        .main-title { font-size: clamp(24px, 5vw, 40px); font-weight: 600; color: #e8e8e8; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); margin-bottom: 25px; letter-spacing: 1px; }
        .accident-free-days { font-size: clamp(70px, 20vw, 140px); font-weight: 900; color: #BDF918; text-shadow: 4px 4px 12px rgba(0, 0, 0, 0.9); margin: 15px 0; line-height: 1; background: rgba(0, 0, 0, 0.3); padding: 10px 5px; border-radius: 8px; font-family: 'Arial Black', sans-serif; }
        .subtitle { font-size: clamp(14px, 3.5vw, 26px); color: #ffffff; text-shadow: 0 0 15px rgba(0, 0, 0, 0.9), 2px 2px 6px rgba(0, 0, 0, 0.9); margin-top: 15px; font-weight: 500; letter-spacing: 0.5px; min-height: 40px; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease-in-out; }
        .footer-text { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); color: #BDF918; font-size: clamp(12px, 2.5vw, 20px); text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9); font-weight: 600; z-index: 5; letter-spacing: 0.5px; }
        .divider { width: 100%; height: 3px; background: linear-gradient(90deg, rgba(189, 249, 24, 0.8) 0%, rgba(189, 249, 24, 0.3) 50%, rgba(189, 249, 24, 0.8) 100%); z-index: 4; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .logo-area { top: 10px; left: 10px; } .logo-area img { max-width: 70px; } .operation-name { font-size: 40px; } .main-title { font-size: 24px; } .accident-free-days { font-size: 80px; } .day-label { font-size: 20px; } .subtitle { font-size: 16px; } .footer-text { font-size: 14px; bottom: 10px; } }
        @media (max-width: 480px) { .operation-name { font-size: 32px; } .main-title { font-size: 18px; } .accident-free-days { font-size: 60px; } .day-label { font-size: 16px; } .subtitle { font-size: 13px; } }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="background-wrapper" id="backgroundWrapper"></div>

        <div class="operation-section" id="op1Section">
            <div class="logo-area"><img src="./logo.png" alt="회사 로고"></div>
            <div class="billboard-content">
                <div class="operation-name">OP1</div>
                <div class="main-title">무재해일수</div>
                <div class="accident-free-days" id="op1DayCounter">0</div>
                <div class="subtitle" id="op1Subtitle">함께 만드는 안전한 작업장</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="operation-section" id="op2Section">
            <div class="logo-area"><img src="./logo.png" alt="회사 로고"></div>
            <div class="billboard-content">
                <div class="operation-name">OP2</div>
                <div class="main-title">무재해일수</div>
                <div class="accident-free-days" id="op2DayCounter">0</div>
                <div class="subtitle" id="op2Subtitle">함께 만드는 안전한 작업장</div>
            </div>
            <div class="footer-text">THINK SAFETY WORK SAFELY</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            subtitles: [
                '함께 만드는 안전한 작업장',
                '나의 안전이 동료의 안전입니다',
                '안전한 직장, 행복한 가족',
                '안전이 최고의 가치입니다',
                '무재해는 우리의 목표입니다',
                '안전 없이는 성공도 없습니다'
            ],
            logoImage: 'logo.png',
            // 배경 이미지 배열로 수정 (1~7)
            backgroundImages: [
                'background1.jpg', 'background2.jpg', 'background3.jpg', 
                'background4.jpg', 'background5.jpg', 'background6.jpg', 'background7.jpg'
            ],
            op1StartDate: new Date('2024-06-12'),
            op2StartDate: new Date('2024-10-24')
        };

        let currentIndexOP1 = 0;
        let currentIndexOP2 = 0;
        let bgIndex = 0; // 배경 이미지 인덱스

        // ===== 배경 이미지 로테이션 기능 추가 =====
        function rotateBackground() {
            const bgWrapper = document.getElementById('backgroundWrapper');
            bgIndex = (bgIndex + 1) % CONFIG.backgroundImages.length;
            bgWrapper.style.backgroundImage = `url('./${CONFIG.backgroundImages[bgIndex]}')`;
        }

        function rotateSubtitleOP1() {
            const subtitle = document.getElementById('op1Subtitle');
            subtitle.style.opacity = '0';
            setTimeout(() => {
                const subtitleIndex = currentIndexOP1 % CONFIG.subtitles.length;
                subtitle.textContent = CONFIG.subtitles[subtitleIndex];
                subtitle.style.opacity = '1';
                currentIndexOP1++;
            }, 250);
        }

        function rotateSubtitleOP2() {
            const subtitle = document.getElementById('op2Subtitle');
            subtitle.style.opacity = '0';
            setTimeout(() => {
                const subtitleIndex = currentIndexOP2 % CONFIG.subtitles.length;
                subtitle.textContent = CONFIG.subtitles[subtitleIndex];
                subtitle.style.opacity = '1';
                currentIndexOP2++;
            }, 250);
        }

        function calculateAccidentFreeDays(startDate) {
            const today = new Date();
            startDate.setHours(0, 0, 0, 0);
            today.setHours(0, 0, 0, 0);
            const timeDifference = today - startDate;
            return Math.max(0, Math.floor(timeDifference / (1000 * 60 * 60 * 24)));
        }

        function updateOP1Counter() {
            const days = calculateAccidentFreeDays(new Date(CONFIG.op1StartDate));
            document.getElementById('op1DayCounter').textContent = days;
        }

        function updateOP2Counter() {
            const days = calculateAccidentFreeDays(new Date(CONFIG.op2StartDate));
            document.getElementById('op2DayCounter').textContent = days;
        }

        function initialize() {
            // 초기 배경 설정
            document.getElementById('backgroundWrapper').style.backgroundImage = `url('./${CONFIG.backgroundImages[0]}')`;

            updateOP1Counter();
            updateOP2Counter();
            rotateSubtitleOP1();
            rotateSubtitleOP2();

            // 10초 간격으로 실행되는 인터벌들
            setInterval(rotateSubtitleOP1, 10000);
            setInterval(rotateSubtitleOP2, 10000);
            setInterval(rotateBackground, 10000); // 배경 10초마다 변경

            scheduleUpdate();
        }

        function scheduleUpdate() {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(0, 0, 0, 0);
            const timeUntilMidnight = tomorrow - now;
            setTimeout(() => {
                updateOP1Counter();
                updateOP2Counter();
                setInterval(() => {
                    updateOP1Counter();
                    updateOP2Counter();
                }, 24 * 60 * 60 * 1000);
            }, timeUntilMidnight);
        }

        window.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
